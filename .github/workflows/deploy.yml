name: Build & Deploy

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    name: Build Angular & Deploy via rsync
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build production
        run: npm run build -- --configuration production

      - name: Deploy via rsync
        env:
          SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
        run: |
          # Prepare SSH
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p "$DEPLOY_PORT" -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

          # Sync build output (Angular 17+ outputs to dist/<name>/browser/)
          rsync -avz --delete \
            -e "ssh -p $DEPLOY_PORT -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no" \
            dist/sakai-ng/browser/ \
            "$DEPLOY_USER@$DEPLOY_HOST:/home/autonomadeica/public_html/software-uai/silogi/prod/"

          # Clean up key
          rm -f ~/.ssh/id_rsa
