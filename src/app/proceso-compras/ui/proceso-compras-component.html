@if (dataUser?.role == 'Responsable') {
  <app-card cardClass="" [showHeader]="false">
  
  <div card-header class="flex items-center gap-3 text-xl font-semibold pb-2">
    
    @if (mostrarFlujoCompra()) {
      <i class="pi pi-file text-blue-500"></i>
      <span>PROCESO DE COMPRAS</span>

      <i class="pi pi-angle-right text-gray-400"></i>

      <i class="pi pi-shopping-cart text-orange-500"></i>
      <span>ORDEN DE COMPRA</span>

      <i class="pi pi-angle-right text-gray-400"></i>

      <i class="pi pi-check-circle text-green-500"></i>
      <span>PEDIDO</span>
    } @else {
      <span>PROCESO DE COMPRAS</span>
    }

  </div>

  <app-search-subtarea></app-search-subtarea>
</app-card>

}
@else {
  <app-panel-solicitudes-component></app-panel-solicitudes-component>
}
