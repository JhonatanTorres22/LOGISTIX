<p-table #dtServicios>
    
    <ng-template #caption>
        <div class="flex justify-between gap-4">
            <p-iconfield iconPosition="left" class="w-full">
                <p-inputicon>
                    <i class="pi pi-search"></i>
                </p-inputicon>
                <input class="w-full" pInputText type="text" placeholder="Buscar Servicio"
                    (input)="dtServicios.filterGlobal($any($event.target).value, 'contains')" />
            </p-iconfield>

            <ui-button icon="pi pi-plus" (click)="seleccionarServicio()" label="AGREGAR"></ui-button>

        </div>
    </ng-template>
</p-table>

@if (visibleAddServicio) {
<app-add-edit-servicios [(visible)]="visibleAddServicio"></app-add-edit-servicios>
}
