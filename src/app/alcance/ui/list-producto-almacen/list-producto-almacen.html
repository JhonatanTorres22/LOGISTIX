<ui-button label="Agregar Producto" (onClick)="visibleAddProductoAlmacen = true"></ui-button>
@if (loading) {
    <ui-loading-progress-bar></ui-loading-progress-bar>
}
<p-table
  [value]="listProductoPorAlmacen()"
  [paginator]="true"
  [rows]="tamanioPagina()"
  [totalRecords]="totalRegistros()"
  [lazy]="true"
  (onLazyLoad)="onPageChange($event)"
  styleClass="p-datatable-sm p-datatable-striped"
>
  <ng-template pTemplate="header">
    <tr>
      <th>ID</th>
      <th>Producto</th>
      <th>Stock</th>
      <th>Estado</th>
      <th>Comprometido</th>
    </tr>
  </ng-template>

  <ng-template pTemplate="body" let-item>
    <tr>
      <td>{{ item.idProductoPorAlmacen }}</td>

      <td>
        <span class="font-medium">
          {{ item.idProductoServicio }}
        </span>
      </td>

      <!-- STOCK NUMÉRICO -->
      <td>
        <span class="font-semibold">
          {{ item.stock }}
        </span>
      </td>

      <!-- ESTADO CON TAG -->
      <td>
        <p-tag
          [value]="
            item.stock > 0
              ? 'En stock'
              : item.stock < 0
              ? 'Sin stock'
              : 'Agotado'
          "
          [severity]="
            item.stock > 0
              ? 'success'
              : item.stock < 0
              ? 'danger'
              : 'warning'
          "
        ></p-tag>
      </td>

      <!-- COMPROMETIDO -->
      <td>
        <p-tag
          [value]="item.comprometido"
          severity="info"
        ></p-tag>
      </td>
    </tr>
  </ng-template>
</p-table>
<!-- <pre> {{listProductoPorAlmacen() | json}} </pre> -->
@if (visibleAddProductoAlmacen) {
    <app-add-producto-almacen [(visible)]="visibleAddProductoAlmacen"></app-add-producto-almacen>
}
