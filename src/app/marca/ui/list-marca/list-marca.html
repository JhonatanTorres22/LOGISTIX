@if (loading) {
<ui-loading-progress-bar></ui-loading-progress-bar>
}
@else {
@if (listMarca().length > 0) {
<p-table #dtProveedor [value]="listMarca()" [globalFilterFields]="['nombre', 'descripcion','accion']"
    selectionMode="single" dataKey="id" [tableStyle]="{ 'min-width': '50rem' }" [rows]="20" [paginator]="true"
    [rowsPerPageOptions]="[20,100,1000]"
    currentPageReportTemplate="Mostrando {first} a {last} de {totalRecords} registros">

    <ng-template #caption>
        <div class="flex justify-between gap-4">
            <p-iconfield iconPosition="left" class="w-full">
                <p-inputicon>
                    <i class="pi pi-search"></i>
                </p-inputicon>
                <input class="w-full" pInputText type="text" placeholder="Buscar Marca"
                    (input)="dtProveedor.filterGlobal($any($event.target).value, 'contains')" />
            </p-iconfield>

            <ui-button icon="pi pi-plus" (click)="seleccionarMarca(selectMarcaDefault)" label="AGREGAR"></ui-button>

        </div>
    </ng-template>

    <ng-template #header>
        <tr>
            <th pSortableColumn="nombre" style="width:40%">NOMBRE<p-sortIcon field="name" /></th>
            <th pSortableColumn="area" style="width:40%">DESCRIPCIÓN <p-sortIcon field="area" />
            </th>
            <th pSortableColumn="accion" style="width:20%">ACCIONES<p-sortIcon field="accion" /></th>
        </tr>
    </ng-template>

    <ng-template #body let-marca>
        <tr [pSelectableRow]="marca">
            <td class="ml-1 align-middle">
                <div class="flex items-center gap-2">
                    {{marca.nombreMarca}}
                </div>
            </td>

            <td class="ml-1 align-middle">
                <div class="flex items-center gap-2">
                    {{marca.descripcionMarca}}
                </div>
            </td>

            <td class="flex items-center gap-2">
                <ui-icon-button icon="pi pi-pencil" (onClick)="seleccionarMarca(marca)" tooltip="Editar"></ui-icon-button>
                <ui-icon-button icon="pi pi-trash" color="danger" (onClick)="confirmEliminarMarca(marca)"
                    tooltip="Eliminar"></ui-icon-button>
            </td>
        </tr>
    </ng-template>

    <ng-template emptymessage>
        <tr>
            <td colspan="4">NO SE ENCUENTRAN MARCAS DISPONIBLES</td>
        </tr>
    </ng-template>
</p-table>
}
@else {
<ui-card-not-items text="No se encuentran Marcas creada"
[showButton]="true" (click)="seleccionarMarca(selectMarcaDefault)"></ui-card-not-items>
}

}

@if (visibleAddMarca) {
    <app-add-edit-marca [(visible)]="visibleAddMarca"></app-add-edit-marca>
}
