@if (loading) {
<ui-loading-progress-bar></ui-loading-progress-bar>
}
@else {
  <!-- <pre> {{codigoSolicitudCompraNavbar()}} </pre> -->
   <!-- <pre> {{listOrdenCarpeta() |json}} </pre> -->
  <!-- <pre> {{nodes | json}} </pre> -->

@if (nodes.length > 0) {
<div class="tree-layout" [class.collapsed]="treeCollapsed">

  <div class="tree-panel">

    <button class="collapse-btn" (click)="toggleTree()">
      <i class="pi pi-bars"></i>
    </button>

    <div class="tree-container">
      <p-tree
        [value]="nodes"
        selectionMode="single"
        (onNodeSelect)="onNodeSelect($event)"
        styleClass="vscode-tree"
      >
        <ng-template let-node pTemplate="default">
          <div class="custom-node">
            <i [class]="getIconClass(node)"></i>
            <span class="node-label"
                  [class.node-sin-anexo]="node.key?.startsWith('solicitud') && node.data?.cantidadAnexo === 0"
                  [title]="node.label">
              {{ node.label }}
            </span>
          </div>
        </ng-template>
      </p-tree>
    </div>
  </div>

  <div class="content-panel">
    @if (subtarea().codigoSubTarea !== 0) {
      <div class="empty-state">
        <app-list-solicitud-compra [modo]="'tree'"></app-list-solicitud-compra>
      </div>
    } @else {
      <div class="empty-state">
        <ui-card-not-items text="Seleccione una solicitud de compra"></ui-card-not-items>
      </div>
    }
  </div>

</div>
} @else {
<div class="empty-state">
  <ui-card-not-items text="No hay solicitudes pendientes"></ui-card-not-items>
</div>
}
}
