@if (loading) {
<ui-loading-progress-bar></ui-loading-progress-bar>
}
@if (listCategorias().length > 0) {
<p-table #dt1 [value]="listCategorias()" [globalFilterFields]="['nombre', 'descripcion', 'accion']"
    selectionMode="single" dataKey="idCategoria" [tableStyle]="{ 'min-width': '50rem' }" [rows]="20" [paginator]="true"
    [rowsPerPageOptions]="[20,100,1000]"
    currentPageReportTemplate="Mostrando {first} a {last} de {totalRecords} registros">

    <ng-template #caption>
        <div class="flex justify-between gap-2">
            <p-iconfield iconPosition="left" class="w-full">
                <p-inputicon>
                    <i class="pi pi-search"></i>
                </p-inputicon>
                <input class="w-full" pInputText type="text" placeholder="Buscar Categoria"
                    (input)="dt1.filterGlobal($any($event.target).value, 'contains')" />
            </p-iconfield>
            <ui-button (click)="seleccionarCategoria(selectCategoriaDefault)" label="AGREGAR"></ui-button>
        </div>
    </ng-template>

    <ng-template #header>
        <tr>
            <th pSortableColumn="nombre" style="width:5%">NOMBRE<p-sortIcon field="name" /></th>
            <th pSortableColumn="area" style="width:10%">
                DESCRIPCIÓN <p-sortIcon field="area" />
            </th>

            <th pSortableColumn="accion" style="width:2%">ACCIONES<p-sortIcon field="accion" /></th>
        </tr>
    </ng-template>

    <ng-template #body let-categoria>
        <tr [pSelectableRow]="categoria">
            <td>
                <span class="ml-1 align-middle">{{ categoria.nombre }}</span>
            </td>
            <td>
                <div class="flex items-center gap-2">
                    <span class="ml-1 align-middle">{{ categoria.descripcion }}</span>
                </div>
            </td>
            <td>
                <div class="flex items-center gap-2">
                    <ui-icon-button icon="pi pi-pencil" tooltip="Editar"
                        (click)="seleccionarCategoria(categoria)"></ui-icon-button>

                    <ui-icon-button icon="pi pi-trash" color="danger" tooltip="Eliminar"
                        (click)="eliminarConfirm(categoria)"></ui-icon-button>

                </div>
            </td>
        </tr>
    </ng-template>

    <ng-template emptymessage>
        <tr>
            <td colspan="4">NO SE ENCUENTRAN PROVEEDORES DISPONIBLES</td>
        </tr>
    </ng-template>
</p-table>


}
@else {
<ui-card-not-items text="No se encuentran Categorías creadas" icon="pi pi-inbox" [showButton]="true"
    label="Crear Categoría" (onClick)="visibleAdd = true"></ui-card-not-items>
}

@if (visibleAdd) {
<app-add-edit-categoria [(visible)]="visibleAdd"></app-add-edit-categoria>
}
