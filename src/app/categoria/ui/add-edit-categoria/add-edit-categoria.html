@if (loading) {
    <ui-loading-progress-bar></ui-loading-progress-bar>
}

<p-dialog [(visible)]="visible" [modal]="true" [style]="{ width: '40rem' }" (onHide)="closeDialog()">
    <ng-template #header>
        <div class="inline-flex items-center justify-center gap-2">
            <span class="font-bold whitespace-nowrap"> {{categoriaSelect().idCategoria === 0 ? 'AGREGAR CATEGORIA' : 'EDITAR CATEGORIA'}} </span>
        </div>
    </ng-template>
    <!-- <pre> {{categoriaSelect() | json}} </pre> -->

    <div class="pt-3">

        <form [formGroup]="categoriaForm" class="flex flex-column gap-4">

            <ui-input label="Nombre" formControlName="nombre" [maxlength]="maxLengthNombre"
                [minlength]="minLengthNombre" [expReg]="expLockNombre"
                [patternErrorMessage]="'No debe incluir espacios al final de la palabra'">
            </ui-input>

            <ui-input label="Descripción" formControlName="descripcion" [maxlength]="maxLengthDescripcion" [minlength]="minLengthDescripcion"
                [expReg]="expLockDescripcion"
                [patternErrorMessage]="'No debe incluir espacios al final de la palabra'">
            </ui-input>

        </form>
    </div>

    <ng-template #footer>
        <ui-button label="CANCELAR" icon="pi pi-times" color="secondary" (click)="closeDialog()"></ui-button>
        <ui-button label="GUARDAR" icon="pi pi-save" (onClick)="onSubmit()" [disabled]=" categoriaForm.invalid"></ui-button>
    </ng-template>
</p-dialog>
