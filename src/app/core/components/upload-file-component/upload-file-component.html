<p-fileUpload
  name="pdf"
  accept="application/pdf"
  [customUpload]="true"
  [auto]="true"
  [multiple]="false"
  [disabled]="disabled"
  chooseLabel="Seleccionar PDF"
  uploadLabel="Cargar"
  cancelLabel="Cancelar"
  (uploadHandler)="onPrimeUpload($event)"
  styleClass="w-full">

  <!-- Template interno -->
  <ng-template pTemplate="content">
    <div class="flex flex-column align-items-center gap-3">

      @if (file) {
        <canvas
          #pdfCanvas
          class="w-8rem h-auto border-round shadow-2">
        </canvas>

        <span class="text-sm text-700">
          {{ file.name }}
        </span>

        <ui-button
          icon="pi pi-times"
          color="danger"
          (click)="removeFile()"
          [disabled]="disabled">
        </ui-button>
      }

      @if (!file) {
        <div class="flex flex-column align-items-center gap-2 text-500">
          <i class="pi pi-cloud-upload text-4xl"></i>
          <span>Arrastra o selecciona un PDF</span>
        </div>
      }

    </div>
  </ng-template>
</p-fileUpload>
