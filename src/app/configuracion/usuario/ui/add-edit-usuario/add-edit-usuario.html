@if (loading) {
<ui-loading-progress-bar></ui-loading-progress-bar>
}

<p-dialog [(visible)]="visible" [modal]="true" [style]="{ width: '40rem' }" (onHide)="closeDialog()">
    
    <ng-template #header>
        <div class="inline-flex items-center justify-center gap-2">
            <span class="font-bold whitespace-nowrap"> {{selectUsuario().id == 0 ? 'AGREGAR USUARIO' : 'EDITAR USUARIO'}} </span>
        </div>
    </ng-template>

    <div class="pt-4">
        <form [formGroup]="usuarioForm" class="flex flex-column gap-4">
            <ui-input label="Nombres" formControlName="nombres" [maxlength]="maxLengthNombre"
                [minlength]="minLengthNombre" [expReg]="expLockNombre"
                [patternErrorMessage]="'No debe incluir espacios al final de la palabra'">
            </ui-input>

            <ui-input label="Apellido Paterno" formControlName="apPaterno" [maxlength]="maxLengthNombre"
                [minlength]="minLengthNombre" [expReg]="expLockNombre"
                [patternErrorMessage]="'No debe incluir espacios al final de la palabra'">
            </ui-input>

            <ui-input label="Apellido Materno" formControlName="apMaterno" [maxlength]="maxLengthNombre"
                [minlength]="minLengthNombre" [expReg]="expLockNombre"
                [patternErrorMessage]="'No debe incluir espacios al final de la palabra'">
            </ui-input>

            <ui-input label="Correo" formControlName="correo" [maxlength]="maxLengthNombre"
                [minlength]="minLengthNombre" [patternErrorMessage]="'No debe incluir espacios al final de la palabra'">
            </ui-input>

            <ui-input label="Nª de Documento" formControlName="documento" [maxlength]="maxLengthDocumento"
                [minlength]="minLengthDocumento" [expReg]="expLockDocumento"
                [patternErrorMessage]="'Número de documento inválido'">
            </ui-input>
        </form>
    </div>

    <ng-template #footer>
        <p-button label="CANCELAR" [text]="true" severity="secondary" (click)="closeDialog()" />
        <p-button label="GUARDAR" [outlined]="true" severity="primary" [disabled]=" usuarioForm.invalid"
            (onClick)="guardar()" />
    </ng-template>
</p-dialog>
