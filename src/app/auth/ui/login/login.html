@if (loading) {
    <ui-loading-progress-bar></ui-loading-progress-bar>
}
@else {
    <app-card cardClass="" [showHeader]="false">
    <div class="text-center d-block">

        <h4 class="font-bold pt-0 text-4xl">LOGISTIX</h4>

    </div>
    <p-divider />
    <div class="text-center mb-3 mt-4 f-18 f-w-500 pt-1">INICIAR SESIÓN</div>

    <form [formGroup]="formLogin" class="text-start">

        <ui-input class="w-full" type="password" classInput="h-5rem w-full" [maxlength]="validatorPassword.maxLength"
            [minlength]="validatorPassword.minLength" label="Contraseña" formControlName="password"></ui-input>

        <div class="grid col-6 col-offset-6 mt-6 gap-2">

            <ui-button (click)="iniciarSesion()" icon="pi pi-sign-in" [disabled]="formLogin.invalid" mat-flat-button
            color="primary" class="b-rad-0 m-t-0">INGRESAR</ui-button>
        </div>
    </form>
</app-card>
<ui-button (onClick)="volver()" label="Volver"></ui-button>
}
