<p-card header="" styleClass="shadow-3">

    <!-- <pre>{{selectEvaluacionSunat() | json}}</pre> -->
    @if(pdfUrl){
        <ng-container>
      
          <iframe
            [src]="pdfUrl"
            width="100%"
            height="600px"
            style="border: none; border-radius: 8px;">
          </iframe>
      
        </ng-container>
    }
    @else {
        <ng-template #noFile>
          <p class="text-center">No hay archivo disponible</p>
        </ng-template>
    }


</p-card>
