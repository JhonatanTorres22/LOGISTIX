<p-drawer [(visible)]="visible" [fullScreen]="true" [header]="`EVALUACIÓN DEL PROVEEDOR - ${selectProveedor().nombre} - ${selectProveedor().ruc}`" (onHide)="closeDrawer()">
    <div class="card">
        <div class="flex mb-2 gap-2 justify-end">
            <p-button (onClick)="value = 0" rounded="true" [outlined]="value !== 0" label="1" />
            <p-button (onClick)="value = 1" rounded="true" [outlined]="value !== 1" label="2" />
            <p-button (onClick)="value = 2" rounded="true" [outlined]="value !== 2" label="3" />
            <p-button (onClick)="value = 3" rounded="true" [outlined]="value !== 3" label="4" />
        </div>
        <p-tabs [(value)]="value">
            <p-tablist>
                <p-tab [value]="0">FICHA RUC</p-tab>
                <p-tab [value]="1">CANTIDAD DE TRABAJADORES</p-tab>
                <p-tab [value]="2">DEUDA COACTIVA</p-tab>
                <p-tab [value]="3">REPRESENTANTES LEGALES</p-tab>
            </p-tablist>
            <p-tabpanels>
                <p-tabpanel [value]="0">
                    @if (value === 0) {
                        <ng-container>
                            <app-list-consulta-ruc></app-list-consulta-ruc>
                        </ng-container>
                    }
                </p-tabpanel>

                <p-tabpanel [value]="1">
                    @if (value === 1) {
                        <ng-container>
                            <app-list-trabajadores-prestadores></app-list-trabajadores-prestadores>
                        </ng-container>
                    }
                </p-tabpanel>

                <p-tabpanel [value]="2">
                    @if (value === 2) {
                        <app-list-deuda-coactiva></app-list-deuda-coactiva>
                    }
                    <!-- <app-upload-ficha-evaluacion examenTipo="DEUDA" [criterioId]="2">
                    </app-upload-ficha-evaluacion> -->
                </p-tabpanel>

                <p-tabpanel [value]="3">
                    @if (value === 3) {
                        <app-list-representante-legal></app-list-representante-legal>
                    }
                    <!-- <app-upload-ficha-evaluacion examenTipo="REPRESENTANTES" [criterioId]="3">
                    </app-upload-ficha-evaluacion> -->
                </p-tabpanel>
            </p-tabpanels>
        </p-tabs>
    </div>
</p-drawer>
