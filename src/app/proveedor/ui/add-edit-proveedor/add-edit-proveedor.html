<p-dialog [(visible)]="visible" [modal]="true" [style]="{ width: '40rem' }" (onHide)="closeDialog()">
    <ng-template #header>
        <div class="inline-flex items-center justify-center gap-2">
            <span class="font-bold whitespace-nowrap"> {{proveedorSelect().id == 0 ? 'AGREGAR PROVEEDOR' : 'EDITAR PROVEEDOR'}} </span>
        </div>
    </ng-template>


    <div class="pt-4">

        <form [formGroup]="proveedorForm" class="flex flex-column gap-4">

            <ui-input label="Nombre" formControlName="nombre" [maxlength]="maxLengthNombre"
                [minlength]="minLengthNombre" [expReg]="expRegLockNombre"
                [patternErrorMessage]="'No debe incluir espacios al final de la palabra'">
            </ui-input>

            <ui-input label="RUC" formControlName="ruc" [maxlength]="maxLengthRuc" [minlength]="minLength"
                [expReg]="expRegLockRuc"
                [patternErrorMessage]="'Solo debe incluir números, No incluir espacios al final de la palabra'">
            </ui-input>

            <ui-input label="DIRECCION" formControlName="direccion" [maxlength]="maxLengthDireccion"
                [minlength]="minLengthDireccion"
                [patternErrorMessage]="'No debe incluir espacios al final de la palabra'">
            </ui-input>

            <div class="flex justify-content-between w-full">

                <div class="flex align-items-center">
                    <p-radiobutton name="tipoPersona" value="PERSONA NATURAL CON NEGOCIO" formControlName="tipo"
                        inputId="pn1" />
                    <label class="ml-2" for="pn1">PERSONA NATURAL CON NEGOCIO</label>
                </div>

                <div class="flex align-items-center">
                    <p-radiobutton name="tipoPersona" value="PERSONA NATURAL SIN NEGOCIO" formControlName="tipo"
                        inputId="pn2" />
                    <label class="ml-2" for="pn2">PERSONA NATURAL SIN NEGOCIO</label>
                </div>

                <div class="flex align-items-center">
                    <p-radiobutton name="tipoPersona" value="PERSONA JURÍDICA" formControlName="tipo" inputId="pj1" />
                    <label class="ml-2" for="pj1">PERSONA JURÍDICA</label>
                </div>

            </div>
        </form>
    </div>

    <ng-template #footer>
        <ui-button label="CANCELAR" icon="pi pi-times"  color="secondary" (click)="closeDialog()"></ui-button>
        <ui-button label="GUARDAR" icon="pi pi-save" color="primary" [disabled]="proveedorForm.invalid"
            (onClick)="onSubmit()"></ui-button>

    </ng-template>
</p-dialog>
